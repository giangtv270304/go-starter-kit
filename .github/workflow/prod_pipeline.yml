name: Prod Build

on:
  push:
    branches: [main]
    paths:
      - "go_starter_kit/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/go_starter_kit

jobs:
  prod-build:
  runs-on: ubuntu-latest
  permissions:
    contents: write
    packages: write

  steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get Git tag
      run: |
        TAG_NAME="${GITHUB_REF#refs/tags/}"
        echo "IMAGE_TAG=$TAG_NAME" >> $GITHUB_ENV

    - name: Build and Push Prod image
      run: |
        IMAGE_URI=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        docker build -t "$IMAGE_URI" ./go_starter_kit
        docker push"$IMAGE_URI"

    - name: Commit and push changes
      run: |
        FILE=operations-starter-kit/inventory/group_vars/production/vars.yml
        sed -i "s/^image_tag: .*/image_tag: \"${{ env.IMAGE_TAG }}\"/" "$FILE"
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add "$FILE"
        git commit -m "ci: bump production image_tag to ${{ env.IMAGE_TAG }}" || echo "Nothing to change"
        git push
